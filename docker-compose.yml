

services:
  # MongoDB Database
  mongo:
    image: mongo:4.4
    container_name: employee-management-db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-employee_management}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - employee-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo --quiet --username ${MONGO_USER} --password ${MONGO_PASSWORD} --authenticationDatabase admin
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: employee-management-backend
    command: npx nodemon app.js
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      DATABASEURL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongo:27017/${MONGO_DB:-employee_management}?authSource=admin
      JWTKEY: ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - employee-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: employee-management-frontend
    command: sh -c "npm install && npm start"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - employee-network
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_config:

networks:
  employee-network:
    driver: bridge

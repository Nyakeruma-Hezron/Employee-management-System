version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:4.4
    container_name: employee-management-db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-employee_management}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - employee-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo --quiet --username ${MONGO_USER} --password ${MONGO_PASSWORD} --authenticationDatabase admin
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend Service
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LOWER}/nyxai-backend:latest
    container_name: employee-management-backend
    # Changed to run production build instead of watching files with nodemon
    command: node app.js 
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      DATABASEURL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongo:27017/${MONGO_DB:-employee_management}?authSource=admin
      JWTKEY: ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    # Removed bind mounts: code is securely baked inside the image
    networks:
      - employee-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LOWER}/nyxai-frontend:latest
    container_name: employee-management-frontend
    command: serve -s build -l 3000
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    networks:
      - employee-network
    restart: unless-stopped

  # Nginx reverse proxy and router
  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LOWER}/nyxai-nginx:latest
    container_name: employee-management-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - employee-network
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_config:

networks:
  employee-network:
    driver: bridge
name: Provision Infrastructure

# THE TRIGGER: Only run if files inside the 'ansible' folder are changed
on:
  push:
    branches:
      - main
    paths:
      - 'ansible/**'

jobs:
  configure-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Set up SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_SSH_KEY }}

      - name: Add Azure VPS to Known Hosts
        run: ssh-keyscan -H 4.221.166.232 >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: ansible-playbook -i hosts.ini deploy.yml -u hezron
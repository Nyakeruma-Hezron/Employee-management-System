name: Deploy Application Stack

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repo_owner: ${{ steps.vars.outputs.owner_lower }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repo owner to lowercase for Docker compatibility
        id: vars
        run: echo "owner_lower=${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Tiers concurrently via Docker Buildx caching capabilities
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lower }}/nyxai-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lower }}/nyxai-frontend:latest

      - name: Build and Push Nginx Image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lower }}/nyxai-nginx:latest

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository to copy docker-compose file
        uses: actions/checkout@v4

      - name: Securely Sync production docker-compose file to Host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 4.221.166.232
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/nyxai/employee-system/"

      - name: Execute Remote Image Swap
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 4.221.166.232
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd /opt/nyxai/employee-system
            
            # Export registry owner context as an env variable for docker compose to parse
            export GITHUB_REPOSITORY_OWNER_LOWER="${{ needs.build-and-push.outputs.repo_owner }}"
            
            # Authenticate the server with GHCR using runtime ephemeral token
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull only new target tiers down
            docker compose pull backend frontend nginx
            
            # Seamlessly swap out live containers using detached tracking with zero database drops
            docker compose up -d --no-deps backend frontend nginx
            
            # Prune dangling layers to prevent storage creep on your VPS disk
            docker image prune -f